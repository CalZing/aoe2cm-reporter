<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121010">
    <title>AoE2 CM Reporter</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="screen active">
            <div class="setup-container">
                <div class="logo-area">
                    <div class="logo-icon">⚔️</div>
                    <h1>AoE2 CM Reporter</h1>
                    <p class="subtitle">Report a physical draft to aoe2cm.net</p>
                </div>

                <div class="form-group">
                    <label>Mode</label>
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="post">
                            <span class="mode-title">📋 Post-draft</span>
                            <span class="mode-desc">No timer. Upload when done.</span>
                        </button>
                        <button class="mode-btn" data-mode="live">
                            <span class="mode-title">📡 Live</span>
                            <span class="mode-desc">30s timer. Real-time spectating.</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="preset-id">Preset</label>
                    <input type="text" id="preset-id" placeholder="ID or URL, e.g. WBp4y" autocomplete="off" autocapitalize="off">
                    <div id="preset-preview" class="preset-preview hidden"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="host-name">Host (left)</label>
                        <input type="text" id="host-name" placeholder="Player 1" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="guest-name">Guest (right)</label>
                        <input type="text" id="guest-name" placeholder="Player 2" autocomplete="off">
                    </div>
                </div>
                <button id="create-btn" class="btn-primary">Start Draft</button>
                <div id="setup-error" class="error-box hidden"></div>
            </div>
        </div>

        <!-- DRAFT SCREEN -->
        <div id="draft-screen" class="screen">
            <header id="draft-header">
                <div class="header-left">
                    <span id="hdr-host" class="player-name host-color"></span>
                    <span class="vs">vs</span>
                    <span id="hdr-guest" class="player-name guest-color"></span>
                </div>
                <div class="header-center">
                    <div id="turn-badge" class="turn-badge"></div>
                </div>
                <div class="header-right">
                    <button id="spec-link-btn" class="btn-small" title="Copy spectator link">📋 Spec</button>
                    <button id="undo-btn" class="btn-small hidden" title="Undo last action">↩ Undo</button>
                </div>
            </header>

            <div id="draft-body">
                <div id="turn-indicator" class="turn-indicator">
                    <span id="turn-player" class="turn-player"></span>
                    <span id="turn-action" class="turn-action"></span>
                    <span id="turn-detail" class="turn-detail"></span>
                </div>
                <div id="options-grid" class="options-grid"></div>
                <div id="events-panel" class="events-panel">
                    <h3>Draft Events</h3>
                    <div id="events-list" class="events-list"></div>
                </div>
            </div>

            <div id="draft-footer">
                <button id="upload-btn" class="btn-primary hidden">Upload to aoe2cm.net</button>
            </div>

            <div id="draft-error" class="error-box hidden"></div>
        </div>

        <!-- UPLOAD SCREEN -->
        <div id="upload-screen" class="screen">
            <div class="upload-container">
                <div class="logo-icon">📡</div>
                <h2>Uploading Draft</h2>
                <p id="upload-status">Connecting…</p>
                <div class="progress-bar">
                    <div id="upload-progress" class="progress-fill"></div>
                </div>
                <div id="upload-result" class="upload-result hidden">
                    <p>Draft available at:</p>
                    <a id="spec-url" href="#" target="_blank" class="spec-link"></a>
                    <button id="new-draft-btn" class="btn-primary" style="margin-top:24px;">New Draft</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>
</html>
